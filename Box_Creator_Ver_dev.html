<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
 <head>
  <meta http-equiv="X-UA-Compatible" content="IE=7" />
  <link href="stylesheets/reset.css" rel="stylesheet" type="text/css" />
  <title>Box Creator Gadget</title>
  <link href="stylesheets/layout-css-8.css" rel="stylesheet" type="text/css" />
  <script type="text/javascript" src="scripts/browser-compatibility.js"></script>
 </head>
 <body>
  <div id="page-wrapper">
   <!-- ── Header: diagram + description ──────────────────────────────── -->
   <div class="card clearfix">
    <div class="row_6">
     <div class="column_21">
      <input class="LuaButton" type="button" id="ButtonRead"value="Please Read!" ></button>
     </div>
     <div class="column_100">
      <h1 class="heading1"><span id="GadgetTitle"></span>&nbsp;Version&nbsp;<span id="GadgetVersion"></span></h1>
      </div>
    </div>
   </div>
   <!-- ── Geometry Options ────────────────────────────────────────────── -->
   <div class="section-header">Geometry Measurement Options</div>
   <div class="card">
    <div class="row_4">
     <div class="column_12">
      <img class="image" src="images/boxdim.png" />
     </div>
     <div class="column_13">
      <div class="sub-panel">
       <div class="sub-panel-title">Box Dimensions</div>
       <div class="field-row">
        <label for="WidthField">Width:</label>
        <input type="number" step="any" id="WidthField" placeholder="Width of Box">
       </div>
       <div class="field-row">
        <label for="DepthField">Depth:</label>
        <input type="text" id="DepthField" placeholder="Depth of Box">
       </div>
       <div class="field-row">
        <label for="HeightField">Height:</label>
        <input type="text" id="HeightField" placeholder="Height of Box">
       </div>
      </div>
     </div>
     <div class="column_14">
      <div class="sub-panel">
       <div class="sub-panel-title">Joint Widths</div>
       <div class="checkbox-row">
        <input type="checkbox" class="LuaButton" id="AllJointWidths" onclick="onShowAllWidthsChanged(this)">
        <label for="AllJointWidths">Show All Joint Widths</label>
       </div>
       <div class="field-row">
        <label for="SideTabWidthField">Side Joint Width:</label>
        <input type="text" id="SideTabWidthField" placeholder="Width of Joint">
       </div>
       <div id="showHideTopBottomJoints" style="display: none; " class="">
        <div class="field-row">
         <label for="BottomTabWidthField">Bottom Joint Width:</label>
         <input type="text" id="BottomTabWidthField" placeholder="Width of Bottom Joint">
        </div>
        <div class="field-row" id="showHideLidJointWidth">
         <label for="TopTabWidthField">Lid Joint Width:</label>
         <input type="text" id="TopTabWidthField" placeholder="Width of Lid Joint">
        </div>
       </div>
      </div>
     </div>
     <div class="column_16">
      <div class="sub-panel">
       <div class="sub-panel-title">Machining</div>
       <div class="field-row">
        <label for="AllowanceField">Allowance:</label>
        <input type="text" id="AllowanceField" placeholder="Allowance">
       </div>
       
       <div class="field-row">
        <label for="PartGapField">Part Spacing:</label>
        <input type="text" id="PartGapField" placeholder="Part Gap">
       </div>
       
       <div class="field-row">
        <label for="EdgeField">Clamping Margin:</label>
        <input type="text" id="EdgeField" placeholder="Clamping Margin">
       </div>
      </div>
     </div>
    </div>
    <div class="row_3">
     <div class="row_5">
      <div class="section-header">CNC Machine Options</div>
     </div>
     <div class="faces-panel">
      <div class="sub-panel-title ui-droppable">Parts To Machine</div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeLid" value="1" class="LuaButton" onclick="onMakeLidChanged()">Lid</label>
      </div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeBottom" value="2" class="LuaButton" onclick="onMakeBottomChanged()">Bottom</label>
      </div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeSide1" value="" class="LuaButton">Side 1</label>
      </div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeSide2" value="" class="LuaButton">Side 2</label>
      </div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeEnd1" value="" class="LuaButton">End 1</label>
      </div>
      <div class="face-checkbox">
       <label>
        <input type="checkbox" name="faces" id="MakeEnd2" value="" class="LuaButton">End 2</label>
      </div>
     </div>
     <div class="column_20">
      <div class="tool-bar-left">
       <input type="button" class="ToolPicker" name="ToolChooseButton" id="ToolChooseButton" value="Select Tool"> <span id="ToolNameField">— No Tool Selected —</span>

      </div>
      <div class="tool-bar-right">
       <label class="no-toolpath-label">
        <input type="checkbox" class="LuaButton" name="NoToolpath" id="NoToolpath" value="">No toolpath (create vectors only)</label>
      </div>
     </div>
    </div>
   </div>
   <!-- ── Tool picker ─────────────────────────────────────────────────── -->
   <div class="section-header">Box Configuration Joint Options</div>
   <div class="row_1">
    <div class="column_1">
     <div class="type-panel">
      <div class="type-panel-header">Joint Type</div>
      <div class="type-option clearfix">
       <div class="type-option-radio">
        <label>
         <input type="radio" class="LuaButton" name="TabTypeRadio" id="TabTypeRadio1">Finger</label>
       </div>
       <div class="type-option-preview">
        <img alt="Finger joint preview" src="images/fingerjoint.png" />
       </div>
      </div>
      <div class="type-option-last clearfix">
       <div class="type-option-radio">
        <label>
         <input type="radio" class="LuaButton" name="TabTypeRadio" id="TabTypeRadio2">Dovetail (Pins/Tails)</label>
       </div>
       <div class="type-option-preview">
        <img alt="Dovetail joint preview" src="images/dovetails.png" />
       </div>
      </div>
     </div>
    </div>
    <div class="column_2">
     <div class="type-column-last">
      <div class="type-panel" id="LidTypePanel">
       <div class="type-panel-header">Lid Type</div>
       <div class="type-option clearfix">
        <div class="type-option-radio">
         <label>
          <input type="radio" class="LuaButton" name="LidTypeRadio" id="LidTypeRadio1" onclick="onLidTypeChanged(this)">Flat Lid Panel</label>
        </div>
        <div class="type-option-preview">
         <img alt="Flat lid preview" src="Images/flatlid.png" />
        </div>
       </div>
       <div class="type-option-last clearfix">
        <div class="type-option-radio">
         <label class="">
          <input type="radio" class="LuaButton" name="LidTypeRadio" id="LidTypeRadio2" onclick="onLidTypeChanged(this)">Jointed Lid</label>
        </div>
        <div class="type-option-preview">
         <img alt="Jointed lid preview" src="Images/jointedlid.png" />
        </div>
       </div>
       <div class="type-option-last clearfix" id="RecessFlatLidRow">
        <div class="type-option-radio">
         <label class="">
          <input type="checkbox" class="LuaButton" id="RecessFlatLid">Add Recess Pocket</label>
        </div>
        <div class="type-option-preview">
         <img alt="Recess lid preview" src="Images/RecessLid.png" />
        </div>
       </div>
      </div>
     </div>
    </div>
    <div class="column_4">
     <div class="type-panel" id="BottomTypePanel">
      <div class="type-panel-header">BOTTOM Type</div>
      <div class="bottom-option clearfix">
       <div class="type-option-radio">
        <label>
         <input type="radio" class="LuaButton" name="BottomTypeRadio" id="BottomTypeRadio1" onclick="onBottomTypeChanged(this)">Jointed Bottom</label>
       </div>
       <div class="type-option-preview">
        <img alt="Flat bottom preview" src="images/jointedbottom.png" />
       </div>
      </div>
      <div class="bottom-option clearfix">
       <div class="type-option-radio">
        <label>
         <input type="radio" class="LuaButton" name="BottomTypeRadio" id="BottomTypeRadio2" onclick="onBottomTypeChanged(this)">Flat Bottom Panel</label>
       </div>
       <img alt="Tabbed bottom preview" src="images/BottomPanel.png" width="100" height="46" />
      </div>
      <div class="bottom-option clearfix" id="RecessFlatBottomRow">
       <div class="type-option-radio">
        <label class="">
         <input type="checkbox" class="LuaButton" id="RecessFlatBottom">Add Recess Pocket</label>
       </div>
       <div class="type-option-preview">
        <img alt="No bottom preview" src="images/RecessBottom.png" />
       </div>
      </div>
      <div class="bottom-option clearfix">
       <div class="type-option-radio">
        <label class="">
         <input type="radio" class="LuaButton" name="BottomTypeRadio" id="BottomTypeRadio4" onclick="onBottomTypeChanged(this)">No Bottom</label>
       </div>
       <div class="type-option-preview">
        <img alt="No bottom preview" src="images/NoBottom.png" />
       </div>
      </div>
     </div>
     <!-- ── Joint type + Lid type ──────────────────────────────────────── -->
     <div class="clearfix" style="margin-bottom:10px;">
      <div class="type-column"></div>
     </div>
     <!-- ── Footer: OK / options / Cancel ──────────────────────────────── -->
     <!-- Hidden legacy fieldset (read by Lua) -->
     <fieldset id="theoneiwant" style="display:none;">
      <label>Here it is!</label>
     </fieldset>
    </div>
    <!-- /page-wrapper -->
    <script type="text/javascript">
     // Returns CSS zoom level based on physical screen DPI (IE-specific property).
     // Boundaries: <120=100%, 120=125%, 144=150%, 168=175%, 192+=200%
     function dpiToZoom() {
       var dpi = screen.deviceXDPI ? screen.deviceXDPI : 96;
     
       // if (dpi >= 192) { return "200%"; }
       if (dpi >= 168) { return "200%"; }
       if (dpi >= 144) { return "150%"; }
       // if (dpi >= 120) { return "125%"; }
     
       return "100%";
     }
     
     function applyUiScaleFromRadio() {
  var scale = "100%";

  if (document.getElementById("UiScaleRadio2") &&
      document.getElementById("UiScaleRadio2").checked) {
    scale = "125%";
  }

  if (document.getElementById("UiScaleRadio3") &&
      document.getElementById("UiScaleRadio3").checked) {
    scale = "150%";
  }

  if (document.getElementById("UiScaleRadio4") &&
      document.getElementById("UiScaleRadio4").checked) {
    scale = "175%";
  }

  document.body.style.zoom = scale;
}
     
     // Applies or removes dark mode by toggling the dark-mode class on body.
     function onDarkModeChanged(checkbox) {
     
       if (checkbox.checked) {
         document.body.className = document.body.className + " dark-mode";
       } else {
         document.body.className =
           document.body.className.replace(" dark-mode", "")
                                  .replace("dark-mode", "");
       }
     }
     
     // Hides the Lid Joint Width field when Flat Lid is selected (no joint needed).
     function onLidTypeChanged(radio) {
     
       var lidJointRow = document.getElementById("showHideLidJointWidth");
     
       if (lidJointRow) {
         lidJointRow.style.display =
           document.getElementById("LidTypeRadio1").checked
           ? "none"
           : "block";
       }
      var recessRow = document.getElementById("RecessFlatLidRow");
  if (recessRow) {
    recessRow.style.display = document.getElementById("LidTypeRadio1").checked ? "block" : "none";
  }
     }
     
     // Bottom Type radio buttons are read by Lua.
     function onBottomTypeChanged(radio) {
  var makeBottom = document.getElementById("MakeBottom");
  var recessBottomRow = document.getElementById("RecessFlatBottomRow");

  if (makeBottom) {
    if (radio.id == "BottomTypeRadio1" ||
        radio.id == "BottomTypeRadio2") {
      makeBottom.checked = true;
    }

    if (radio.id == "BottomTypeRadio4") {
      makeBottom.checked = false;
    }
  }

  if (recessBottomRow) {
    recessBottomRow.style.display =
      document.getElementById("BottomTypeRadio2").checked ? "block" : "none";
  }

  updateFaceOptionPanels();
  return true;
}
     
     // Shows or hides the Bottom and Lid joint width fields.
     function onShowAllWidthsChanged(checkbox) {
     
       var el = document.getElementById("showHideTopBottomJoints");
     
       if (el) {
         el.style.display = checkbox.checked ? "block" : "none";
       }
     }
     
     // Grey-out / disable panel helper.
     function setPanelDisabled(panelId, disabled) {
     
       var panel = document.getElementById(panelId);
     
       if (!panel) {
         return;
       }
     
       if (disabled) {
     
         if (panel.className.indexOf("disabled-panel") == -1) {
           panel.className += " disabled-panel";
         }
     
       } else {
     
         panel.className =
           panel.className.replace(" disabled-panel", "")
                          .replace("disabled-panel", "");
       }
     
       var inputs = panel.getElementsByTagName("input");
     
       for (var i = 0; i < inputs.length; i++) {
         inputs[i].disabled = disabled;
       }
     }
     
     // Updates Lid / Bottom panel enabled states.
     function updateFaceOptionPanels() {
     
       var makeLid = document.getElementById("MakeLid");
       var makeBottom = document.getElementById("MakeBottom");
     
       var lidDisabled =
         makeLid && !makeLid.checked;
     
       var bottomDisabled =
         makeBottom && !makeBottom.checked;
     
       setPanelDisabled("LidTypePanel", lidDisabled);
     
       setPanelDisabled("BottomTypePanel", bottomDisabled);
     
     }
     
     // Lid checkbox changed.
     function onMakeLidChanged() {
       updateFaceOptionPanels();
     }
     
     // Bottom checkbox changed.
     function onMakeBottomChanged() {
       updateFaceOptionPanels();
     }
     
     // On load: apply DPI zoom, then restore saved state from Lua registry.
     setTimeout(function() {
     
      applyUiScaleFromRadio();
    
       // Dark mode
       var darkMode = document.getElementById("DarkMode");
     
       if (darkMode) {
         onDarkModeChanged(darkMode);
       }
     
       // Lid type
       var lid1 = document.getElementById("LidTypeRadio1");
     
       if (lid1) {
         onLidTypeChanged(lid1);
       }
     
       // Joint width visibility
       var allWidths = document.getElementById("AllJointWidths");
     
       if (allWidths) {
         onShowAllWidthsChanged(allWidths);
       }
     
       // Apply Lid / Bottom panel disabled states
       updateFaceOptionPanels();
     
     }, 100);
    </script>
   </div>
   <div class="footer-bar clearfix">
    <div class="row_7">
     <div class="column_22">
      <div class="footer-ok-button">
       <button type="button" id="ButtonOK">OK</button>
      </div>
     </div>
     <div class="column_23">
      <div class="row_9">
       <label class="customClass1">
        <input type="checkbox" class="LuaButton" id="DarkMode" onclick="onDarkModeChanged(this)">Enable Dark Mode</label>
      </div>
      <label class="">
       <input type="checkbox" class="LuaButton" id="LabelFaces">Label Part Names</label>
      <div class="footer-option-item">
       <label class="customClass">UI Scale:</label>
       <label class="">
        <input type="radio" class="LuaButton" name="UiScaleRadio" id="UiScaleRadio1" onclick="applyUiScaleFromRadio()">100%</label>
       <label class="">
        <input type="radio" class="LuaButton" name="UiScaleRadio" id="UiScaleRadio2" onclick="applyUiScaleFromRadio()">125%</label>
       <label class="">
        <input type="radio" class="LuaButton" name="UiScaleRadio" id="UiScaleRadio3" onclick="applyUiScaleFromRadio()">150%</label>
       <label>
        <input type="radio" class="LuaButton" name="UiScaleRadio" id="UiScaleRadio4" onclick="applyUiScaleFromRadio()">175%</label>
      </div>
     </div>
     <div class="column_24">
      <button type="button" id="ButtonCancel" class="">Cancel</button>
     </div>
    </div>
   </div>
   <div class="footer-option-item"></div>
  </div>
 </body>

</html>
